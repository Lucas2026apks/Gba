name: Compilar GBA

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Butano y actualizar
        run: dkp-pacman -Syyu --noconfirm tonclib butano

      - name: Compilar juego
        run: make

      - name: Guardar archivo ROM (.gba)
        uses: actions/upload-artifact@v4
        with:
          name: juego-gba
          path: |
            *.gba
            out/*.gba
