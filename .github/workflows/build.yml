name: Compilar GBA

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Actualizar llaves y repositorios de devkitPro
        run: |
          dgp-keys || true
          dkp-pacman -Syyu --noconfirm || true

      - name: Instalar librerias de GBA
        run: dkp-pacman -S --noconfirm gba-dev

      - name: Compilar juego
        run: make

      - name: Guardar archivo ROM (.gba)
        uses: actions/upload-artifact@v4
        with:
          name: juego-gba
          path: |
            *.gba
            out/*.gba
